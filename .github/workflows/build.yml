name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install Java 8 (JDK 8)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Inject Java 8 into Global System Paths
        run: |
          FIXED_JAVA_HOME="/Users/runner/hostedtoolcache/Java_Zulu_jdk/8.0.492-9/arm64/Contents/Home"
          
          # Força links simbólicos globais nos caminhos padrão herdados pelo Xcode
          sudo ln -sf "$FIXED_JAVA_HOME/bin/java" /usr/local/bin/java
          sudo ln -sf "$FIXED_JAVA_HOME/bin/javac" /usr/local/bin/javac
          
          # Garante que o Homebrew Make esteja no lugar certo
          brew install make
          sudo ln -sf /opt/homebrew/bin/gmake /usr/local/bin/gmake
          
          # Teste rápido para validar no terminal principal antes do Xcode entrar
          echo "=== Verificando injeção do Java ==="
          /usr/local/bin/java -version
          /usr/local/bin/javac -version

      - name: Build Xcode Project
        run: |
          FIXED_JAVA_HOME="/Users/runner/hostedtoolcache/Java_Zulu_jdk/8.0.492-9/arm64/Contents/Home"
          
          export JAVA_HOME="$FIXED_JAVA_HOME"
          
          xcodebuild -project Amethyst.xcodeproj \
            -alltargets \
            -configuration Release \
            -sdk iphoneos \
            OBJROOT=build \
            SYMROOT=build \
            CODE_SIGNING_ALLOWED=NO \
            JAVA_HOME="$FIXED_JAVA_HOME"

      - name: Create IPA Package
        run: |
          mkdir -p Payload
          find build -name "*.app" -exec cp -r {} Payload/ \; 2>/dev/null
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone-Ready
          path: Amethyst.ipa
