name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Build Xcode Project
        run: |
          # Compila o projeto gerando o aplicativo definitivo
          xcodebuild -project Amethyst.xcodeproj -scheme Amethyst -configuration Release -sdk iphoneos CONFIGURATION_BUILD_DIR=build

      - name: Create IPA Package
        run: |
          # Empacota o app compilado no formato .ipa para instalação
          mkdir Payload
          cp -r build/Amethyst.app Payload/
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone13-Ready
          path: Amethyst.ipa
