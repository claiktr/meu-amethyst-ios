name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Build Xcode Project
        run: |
          # Descobre automaticamente o primeiro scheme disponível para não errar o nome
          SCHEME=$(xcodebuild -list -json | plutil -extract schemes.0 raw - || echo "")
          if [ -z "$SCHEME" ]; then
            # Se falhar o JSON, tenta pegar a força do formato texto
            SCHEME=$(xcodebuild -list | sed -n '/Schemes:/,$p' | sed '1d' | tr -d ' ' | head -n 1)
          fi
          echo "Scheme encontrado: $SCHEME"
          
          # Executa a compilação com o nome detectado
          xcodebuild -project *.xcodeproj -scheme "$SCHEME" -configuration Release -sdk iphoneos CONFIGURATION_BUILD_DIR=build CODE_SIGNING_ALLOWED=NO

      - name: Create IPA Package
        run: |
          mkdir Payload
          # Copia o aplicativo gerado para dentro do pacote
          cp -r build/*.app Payload/ 2>/dev/null || cp -r build/Release-iphoneos/*.app Payload/
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone13-Ready
          path: Amethyst.ipa
