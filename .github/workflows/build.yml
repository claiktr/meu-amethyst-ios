name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install Java 8 (JDK 8)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Install Build Dependencies
        run: |
          # Instala o GNU Make (gmake) necessário para compilar os códigos nativos do Amethyst
          brew install make
          
          # Cria os atalhos globais do gmake e dos comandos do Java 8 para o sistema dar prioridade total a eles
          sudo ln -sf /opt/homebrew/bin/gmake /usr/local/bin/gmake
          sudo ln -sf /Users/runner/hostedtoolcache/Java_Zulu_jdk/8.0.492-9/arm64/Contents/Home/bin/java /usr/local/bin/java
          sudo ln -sf /Users/runner/hostedtoolcache/Java_Zulu_jdk/8.0.492-9/arm64/Contents/Home/bin/javac /usr/local/bin/javac
          sudo ln -sf /Users/runner/hostedtoolcache/Java_Zulu_jdk/8.0.492-9/arm64/Contents/Home/bin/jar /usr/local/bin/jar

      - name: Build Xcode Project
        run: |
          # Define o caminho absoluto para o JDK 8
          FIXED_JAVA_HOME="/Users/runner/hostedtoolcache/Java_Zulu_jdk/8.0.492-9/arm64/Contents/Home"
          export JAVA_HOME="$FIXED_JAVA_HOME"
          export PATH="/usr/local/bin:$FIXED_JAVA_HOME/bin:$PATH"
          
          # Confere no terminal qual versão do Java está respondendo como principal
          java -version
          javac -version
          
          # Executa a compilação oficial passando o caminho correto
          xcodebuild -project Amethyst.xcodeproj -alltargets -configuration Release -sdk iphoneos OBJROOT=build SYMROOT=build CODE_SIGNING_ALLOWED=NO JAVA_HOME="$FIXED_JAVA_HOME"

      - name: Create IPA Package
        run: |
          mkdir -p Payload
          find build -name "*.app" -exec cp -r {} Payload/ \; 2>/dev/null
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone13-Ready
          path: Amethyst.ipa
