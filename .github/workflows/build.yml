name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install Java 8 (JDK 8)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Install Build Dependencies
        run: |
          # Instala o GNU Make (gmake) necessário para compilar os códigos nativos do Amethyst
          brew install make
          
          # Cria um link simbólico para garantir que o Xcode encontre o gmake exatamente onde ele procura
          sudo ln -s /opt/homebrew/bin/gmake /usr/local/bin/gmake

      - name: Build Xcode Project
        run: |
          # Define o caminho absoluto para o JDK 8 instalado pela Action (Zulu arm64)
          FIXED_JAVA_HOME="/Users/runner/hostedtoolcache/Java_Zulu_jdk/8.0.492-9/arm64/Contents/Home"
          
          export JAVA_HOME="$FIXED_JAVA_HOME"
          export PATH="$FIXED_JAVA_HOME/bin:$PATH"
          echo "Forçando Java Home para: $JAVA_HOME"
          
          # Executa a compilação oficial passando o caminho correto direto no xcodebuild
          xcodebuild -project Amethyst.xcodeproj -alltargets -configuration Release -sdk iphoneos OBJROOT=build SYMROOT=build CODE_SIGNING_ALLOWED=NO JAVA_HOME="$FIXED_JAVA_HOME"

      - name: Create IPA Package
        run: |
          mkdir -p Payload
          # Vasculha profundamente a pasta build atrás do executável real do app
          find build -name "*.app" -exec cp -r {} Payload/ \; 2>/dev/null
          
          # Garante o empacotamento final em .ipa
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone13-Ready
          path: Amethyst.ipa
