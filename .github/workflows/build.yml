name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Build Xcode Project
        run: |
          # Lista os schemes limpos e pega a primeira linha válida abaixo da palavra 'Schemes:'
          SCHEME=$(xcodebuild -list -project Amethyst.xcodeproj | sed -n '/Schemes:/,$p' | sed '1d' | tr -d ' ' | head -n 1)
          echo "Scheme detectado pelo sistema: $SCHEME"
          
          # Compila usando o esquema dinâmico encontrado
          xcodebuild -project Amethyst.xcodeproj -scheme "$SCHEME" -configuration Release -sdk iphoneos CONFIGURATION_BUILD_DIR=build CODE_SIGNING_ALLOWED=NO

      - name: Create IPA Package
        run: |
          mkdir Payload
          cp -r build/*.app Payload/ 2>/dev/null || cp -r build/Release-iphoneos/*.app Payload/ 2>/dev/null
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone13-Ready
          path: Amethyst.ipa
