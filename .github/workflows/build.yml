name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Build Xcode Project
        run: |
          # Compila forçando a saída de todos os arquivos direto para uma pasta limpa chamada 'output'
          xcodebuild -project Amethyst.xcodeproj -alltargets -configuration Release -sdk iphoneos OBJROOT=build SYMROOT=build CODE_SIGNING_ALLOWED=NO dstroot=output install
          
      - name: Create IPA Package
        run: |
          mkdir -p Payload
          # Procura profundamente por qualquer arquivo .app gerado na pasta build e joga no Payload
          find build -name "*.app" -exec cp -r {} Payload/ \; 2>/dev/null
          
          # Compacta o pacote final
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone13-Ready
          path: Amethyst.ipa
