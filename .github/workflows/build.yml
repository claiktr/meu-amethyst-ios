name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install Java 8 (JDK 8)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Install Build Dependencies
        run: |
          # Instala o GNU Make (gmake) necessário para compilar os códigos nativos do Amethyst
          brew install make
          
          # Cria um link simbólico para garantir que o Xcode encontre o gmake exatamente onde ele procura
          sudo ln -s /opt/homebrew/bin/gmake /usr/local/bin/gmake

      - name: Build Xcode Project
        run: |
          # Exporta explicitamente o caminho do Java instalado para que o Makefile consiga localizá-lo
          export JAVA_HOME=$JAVA_HOME_8_X64
          
          # Executa a compilação oficial gerando os binários nativos
          xcodebuild -project Amethyst.xcodeproj -alltargets -configuration Release -sdk iphoneos OBJROOT=build SYMROOT=build CODE_SIGNING_ALLOWED=NO

      - name: Create IPA Package
        run: |
          mkdir -p Payload
          # Vasculha profundamente a pasta build atrás do executável real do app
          find build -name "*.app" -exec cp -r {} Payload/ \; 2>/dev/null
          
          # Garante o empacotamento final em .ipa
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone13-Ready
          path: Amethyst.ipa
