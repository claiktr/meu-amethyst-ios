name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Build Xcode Project
        run: |
          # Compila o esquema correto ignorando assinaturas e travando os caminhos
          xcodebuild -workspace *.xcworkspace -scheme Amethyst -configuration Release -sdk iphoneos CONFIGURATION_BUILD_DIR=build CODE_SIGNING_ALLOWED=NO || \
          xcodebuild -project *.xcodeproj -scheme Amethyst -configuration Release -sdk iphoneos CONFIGURATION_BUILD_DIR=build CODE_SIGNING_ALLOWED=NO || \
          xcodebuild -project *.xcodeproj -scheme Launcher -configuration Release -sdk iphoneos CONFIGURATION_BUILD_DIR=build CODE_SIGNING_ALLOWED=NO

      - name: Create IPA Package
        run: |
          mkdir Payload
          # Procura o aplicativo gerado e joga no pacote .ipa
          cp -r build/*.app Payload/ 2>/dev/null || cp -r build/Release-iphoneos/*.app Payload/ 2>/dev/null || cp -r *.app Payload/ 2>/dev/null
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone13-Ready
          path: Amethyst.ipa
