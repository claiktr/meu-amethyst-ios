name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install Java 8 (JDK 8)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Install Build Dependencies
        run: |
          brew install make
          sudo ln -sf /opt/homebrew/bin/gmake /usr/local/bin/gmake

      - name: Build Xcode Project
        run: |
          FIXED_JAVA_HOME="/Users/runner/hostedtoolcache/Java_Zulu_jdk/8.0.492-9/arm64/Contents/Home"
          
          # Injeta nas variáveis locais antes do comando
          export JAVA_HOME="$FIXED_JAVA_HOME"
          export PATH="$FIXED_JAVA_HOME/bin:$PATH"
          
          # Executa o Xcode passando o Java 8 via argumentos diretos de Build Settings e forçando o PATH interno do Target
          xcodebuild -project Amethyst.xcodeproj \
            -alltargets \
            -configuration Release \
            -sdk iphoneos \
            OBJROOT=build \
            SYMROOT=build \
            CODE_SIGNING_ALLOWED=NO \
            JAVA_HOME="$FIXED_JAVA_HOME" \
            JAVA_COMPILER="$FIXED_JAVA_HOME/bin/javac" \
            PATH="$FIXED_JAVA_HOME/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

      - name: Create IPA Package
        run: |
          mkdir -p Payload
          find build -name "*.app" -exec cp -r {} Payload/ \; 2>/dev/null
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone13-Ready
          path: Amethyst.ipa
