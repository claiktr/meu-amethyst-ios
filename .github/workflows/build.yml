name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install XcodeGen
        run: |
          # Instala a ferramenta que recria os esquemas perdidos do projeto
          brew install xcodegen

      - name: Generate Clean Project
        run: |
          # Força a geração de um novo projeto limpo e com esquemas públicos
          xcodegen generate || echo "XcodeGen não necessário ou falhou, tentando compilação direta..."

      - name: Build Xcode Project
        run: |
          # Descobre dinamicamente o novo esquema gerado pelo XcodeGen
          SCHEME=$(xcodebuild -list | sed -n '/Schemes:/,$p' | sed '1d' | tr -d ' ' | head -n 1)
          echo "Novo Scheme gerado: $SCHEME"
          
          # Compila o projeto gerado de forma limpa
          xcodebuild -scheme "$SCHEME" -configuration Release -sdk iphoneos CONFIGURATION_BUILD_DIR=build CODE_SIGNING_ALLOWED=NO

      - name: Create IPA Package
        run: |
          mkdir Payload
          cp -r build/*.app Payload/ 2>/dev/null || cp -r build/Release-iphoneos/*.app Payload/ 2>/dev/null
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone13-Ready
          path: Amethyst.ipa
