name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '14.3.1'

      - name: Install Java 8 (JDK 8)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Configure Legacy Environment
        run: |
          # Define o caminho correto do Java para o Xcode encontrar nativamente
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          
          # Cria os links que o Makefile antigo espera
          sudo ln -sf "$JAVA_HOME/bin/java" /usr/local/bin/java
          sudo ln -sf "$JAVA_HOME/bin/javac" /usr/local/bin/javac
          
          # Garante o gmake do Homebrew
          brew install make
          sudo ln -sf /opt/homebrew/bin/gmake /usr/local/bin/gmake

      - name: Build Xcode Project
        run: |
          export PATH="/usr/local/bin:$JAVA_HOME/bin:$PATH"
          
          xcodebuild -project Amethyst.xcodeproj \
            -alltargets \
            -configuration Release \
            -sdk iphoneos \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            OBJROOT=build \
            SYMROOT=build \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA Package
        run: |
          mkdir -p Payload
          find build -name "*.app" -exec cp -r {} Payload/ \; 2>/dev/null
          zip -r Amethyst.ipa Payload
          
      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-iPhone-Ready
          path: Amethyst.ipa
